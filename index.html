// ===== APP STATE =====
let state = {
  lang: localStorage.getItem('lang') || 'en',
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  page: 'dashboard',
  sidebarOpen: false,
  view: 'home'
};

function t(key) { return T[state.lang][key] || key; }
function setState(updates) { Object.assign(state, updates); render(); }

// ===== RENDER ENGINE =====
function render() {
  const app = document.getElementById('app');
  if (state.view === 'home') { app.innerHTML = renderHome(); }
  else if (state.view === 'login') { app.innerHTML = renderLogin(); }
  else { app.innerHTML = renderShell(); }
  lucide.createIcons();
  bindEvents();
}

function getNavItems() {
  const role = state.user.role;
  let items = [{ key:'dashboard', icon:'layout-dashboard', label:t('dashboard') }];
  items.push({ key:'notices', icon:'megaphone', label:t('notices') });
  if(role==='admin'||role==='owner'||role==='tenant') items.push({ key:'finances', icon:'wallet', label:t('finances') });
  if(role==='admin'||role==='owner'||role==='tenant') items.push({ key:'complaints', icon:'message-square-warning', label:t('complaints') });
  if(role==='admin'||role==='staff') items.push({ key:'visitors', icon:'user-check', label:t('visitors') });
  if(role==='admin') items.push({ key:'staffMgmt', icon:'users', label:t('staffMgmt') });
  if(role==='admin'||role==='owner') items.push({ key:'directory', icon:'book-open', label:t('directory') });
  if(role==='admin'||role==='owner'||role==='tenant') items.push({ key:'bookings', icon:'calendar-check', label:t('bookings') });
  if(role==='staff') items.push({ key:'duties', icon:'clipboard-check', label:t('duties') });
  return items;
}

      </div>

    <main class="flex-1 overflow-y-auto bg-gradient-to-br from-slate-50 via-blue-25 to-slate-75">
      <header class="hidden md:flex items-center justify-between px-6 py-4 border-b glass border-slate-200/50 bg-white/60 backdrop-blur-sm">

          <button id="langToggle" class="px-3 py-1.5 rounded-full text-xs font-semibold glass text-slate-700 hover:shadow-lg transition">${state.lang==='en'?'বাংলা':'English'}</button>
        </div>
      </header>
      <div class="p-4 md:p-6 fade-in">${renderPage()}</div>
    </main>
  </div>`;
}

function renderPage() {
  switch(state.page) {
    case 'dashboard': return renderDashboard();
    case 'notices': return renderNotices();
    case 'finances': return renderFinances();
    case 'complaints': return renderComplaints();
    case 'visitors': return renderVisitors();
    case 'staffMgmt': return renderStaffMgmt();
    case 'directory': return renderDirectory();
    case 'bookings': return renderBookings();
    case 'duties': return renderDuties();
    default: return renderDashboard();
  }
}

function renderComplaints() {
  const isAdmin = state.user.role==='admin';
  const userFlat = state.user.flat;
  const data = isAdmin ? MOCK.complaints : MOCK.complaints.filter(c=>c.flat===userFlat);
  const statusColors = { open:'bg-amber-100 text-amber-700', in_progress:'bg-blue-100 text-blue-700', resolved:'bg-emerald-100 text-emerald-700' };
  return `
  <div class="glass rounded-xl p-5 mb-4 hover:shadow-lg transition">
    <h3 class="font-semibold text-sm text-slate-900 mb-3">${t('newComplaint')}</h3>
    <div class="flex flex-wrap gap-2">
      <select id="complaintType" class="glass-subtle rounded-lg px-3 py-2 text-sm text-slate-800 flex-1 min-w-[120px] focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="Plumbing">${t('plumbing')}</option><option value="Electrical">${t('electrical')}</option>
        <option value="Security">${t('security')}</option><option value="Other">${t('other')}</option>
      </select>
      <input id="complaintTitle" class="glass-subtle rounded-lg px-3 py-2 text-sm text-slate-800 flex-[2] min-w-[200px] focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="${t('title')}">
      <button id="submitComplaint" class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-emerald-600 text-white text-sm rounded-lg hover:shadow-lg transition">${t('submit')}</button>
    </div>
  </div>
  <div class="space-y-3">
    ${data.map(c=>`<div class="glass rounded-xl p-4 hover:shadow-lg transition border-l-4 ${c.status==='open'?'border-l-amber-500':c.status==='in_progress'?'border-l-blue-500':'border-l-emerald-500'}">
      <div class="flex items-start justify-between gap-2">
        <div><h4 class="font-semibold text-sm text-slate-900">${state.lang==='en'?c.title:c.titlebn}</h4>
          <p class="text-[10px] text-slate-600 mt-0.5">${t('flat')} ${c.flat} • ${c.type} • ${c.date}</p>
          ${c.assignee?`<p class="text-[10px] text-indigo-600 mt-1 font-medium">→ ${c.assignee}</p>`:''}
        </div>
        <span class="text-[10px] px-2 py-0.5 rounded-full shrink-0 font-medium ${statusColors[c.status]}">${c.status==='open'?t('open'):c.status==='in_progress'?t('inProgress'):t('resolved')}</span>
      </div>
      ${isAdmin && c.status!=='resolved'?`<div class="mt-2 flex gap-2"><select class="assign-select glass-subtle rounded px-2 py-1 text-[10px] text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" data-id="${c.id}">
        <option>${t('assignTo')}...</option>${MOCK.staff.map(s=>`<option>${s.name}</option>`).join('')}
      </select></div>`:''}
    </div>`).join('')}
  </div>`;
}

// ===== EVENT BINDING =====
function bindEvents() {
  document.getElementById('goToLogin')?.addEventListener('click', e=>{ e.preventDefault(); setState({view:'login'}); });
  document.getElementById('ctaLogin')?.addEventListener('click', e=>{ e.preventDefault(); setState({view:'login'}); });
  document.getElementById('backToHome')?.addEventListener('click', e=>{ e.preventDefault(); setState({view:'home'}); });

  document.getElementById('loginBtn')?.addEventListener('click', e=>{
    e.preventDefault();
    const role = document.getElementById('loginRole').value;
    const user = MOCK.users.find(u=>u.role===role);
    if(user){ localStorage.setItem('user',JSON.stringify(user)); setState({user, page:'dashboard', view:'app'}); }
  });
  document.getElementById('logoutBtn')?.addEventListener('click', e=>{ e.preventDefault(); localStorage.removeItem('user'); setState({user:null, page:'dashboard', sidebarOpen:false, view:'home'}); });
  document.getElementById('menuBtn')?.addEventListener('click', ()=>setState({sidebarOpen:!state.sidebarOpen}));
  document.getElementById('overlay')?.addEventListener('click', ()=>setState({sidebarOpen:false}));
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click', e=>{ e.preventDefault(); setState({page:e.currentTarget.dataset.nav,sidebarOpen:false}); }));

  const langBtns = ['langToggle','langToggleM','langToggleLogin','langToggleHome'];
  langBtns.forEach(id=>{ document.getElementById(id)?.addEventListener('click', ()=>{ const nl=state.lang==='en'?'bn':'en'; localStorage.setItem('lang',nl); setState({lang:nl}); }); });

  document.getElementById('postNoticeBtn')?.addEventListener('click', e=>{
    e.preventDefault();
    const title=document.getElementById('noticeTitle').value;
    const body=document.getElementById('noticeBody').value;
    const priority=document.getElementById('noticePriority').value;
    if(title){ MOCK.notices.unshift({id:Date.now(),title,titlebn:title,body,bodybn:body,date:new Date().toISOString().split('T')[0],priority}); document.getElementById('noticeTitle').value=''; document.getElementById('noticeBody').value=''; render(); }
  });

  document.getElementById('submitComplaint')?.addEventListener('click', e=>{
    e.preventDefault();
    const type=document.getElementById('complaintType').value;
    const title=document.getElementById('complaintTitle').value;
    if(title){ MOCK.complaints.unshift({id:Date.now(),flat:state.user.flat,type,title,titlebn:title,status:'open',date:new Date().toISOString().split('T')[0],assignee:null}); document.getElementById('complaintTitle').value=''; render(); }
  });

  document.getElementById('addVisitorBtn')?.addEventListener('click', e=>{
    e.preventDefault();
    const name=document.getElementById('vName').value;
    const phone=document.getElementById('vPhone').value;
    const flat=document.getElementById('vFlat').value;
    const vehicle=document.getElementById('vVehicle').value;
    if(name){ MOCK.visitors.unshift({id:Date.now(),name,phone,flat,vehicle,purpose:'Guest',time:new Date().toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'}),date:new Date().toISOString().split('T')[0]}); document.getElementById('vName').value=''; document.getElementById('vPhone').value=''; document.getElementById('vFlat').value=''; document.getElementById('vVehicle').value=''; render(); }
  });

  document.getElementById('bookBtn')?.addEventListener('click', e=>{
    e.preventDefault();
    const facility=document.getElementById('bookFacility').value;
    const date=document.getElementById('bookDate').value;
    if(date){ MOCK.bookings.unshift({id:Date.now(),facility,facilitybn:facility,flat:state.user.flat,date,time:'TBD',status:'pending'}); document.getElementById('bookDate').value=''; render(); }
  });

  document.querySelectorAll('.duty-toggle').forEach(el=>el.addEventListener('click', ()=>{
    const id=parseInt(el.dataset.id);
    const duty=MOCK.duties.find(d=>d.id===id);
    if(duty){duty.done=!duty.done; render();}
  }));

  document.getElementById('dirSearch')?.addEventListener('input', e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('.dir-row').forEach(row=>{
      row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';
    });
  });
}

// ===== INIT =====
render();
  </script>
 </body>
